name: Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'move-auditor/**'
      - '!move-auditor/VERSION'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT=$(cat move-auditor/VERSION | tr -d '[:space:]')
          NEW=$((CURRENT + 1))
          echo "$NEW" > move-auditor/VERSION
          echo "Version bump: ${CURRENT} -> ${NEW}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add move-auditor/VERSION
          git diff --cached --quiet && exit 0
          git commit -m "bump(move-auditor): $(cat move-auditor/VERSION)"
          git push
